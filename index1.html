<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 1.1</title>
</head>
<body>
    <h2>Obliczanie trójkąta</h2>
    <button onclick="start()">Oblicz</button>
    <p id="wynik"></p>

    <script>
        function start() {
            let a = parseFloat(prompt("Podaj długość boku a:"));
            let b = parseFloat(prompt("Podaj długość boku b:"));
            let c = parseFloat(prompt("Podaj długość boku c:"));

            let obwod = a + b + c;
            let p = obwod / 2; 
            let pole = Math.sqrt(p * (p - a) * (p - b) * (p - c));

            document.getElementById("wynik").innerHTML = 
                "Obwód: " + obwod + "<br>Pole: " + pole.toFixed(2);
        }
    </script>
</body>
</html>
