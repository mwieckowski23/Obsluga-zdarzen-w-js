<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 1.2</title>
</head>
<body>
    <h2>Obliczanie trójkąta</h2>
    
    Bok a: <input type="number" id="A"><br><br>
    Bok b: <input type="number" id="B"><br><br>
    Bok c: <input type="number" id="C"><br><br>
    
    <button onclick="oblicz()">Oblicz</button>
    
    <div id="rezultat" style="margin-top: 15px;"></div>

    <script>
        function oblicz() {
            let a = parseFloat(document.getElementById("A").value);
            let b = parseFloat(document.getElementById("B").value);
            let c = parseFloat(document.getElementById("C").value);

            let obwod = a + b + c;
            let p = obwod / 2;
            let pole = Math.sqrt(p * (p - a) * (p - b) * (p - c));

            document.getElementById("rezultat").innerHTML = 
                "<b>Wyniki:</b><br>Obwód: " + obwod + "<br>Pole: " + pole.toFixed(2);
        }
    </script>
</body>
</html>
